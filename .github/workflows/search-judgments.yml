name: Search DHC Judgments (eDHCR)

# Triggered on-demand from the LexTrack app's Judgments page when the
# user picks "Source: DHC Official" + types a proposition. Scrapes
# https://edhcr.nic.in/ and writes results to data/searches/<hash>.json
# which the browser polls for.

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'Search query / legal proposition'
        required: true
      mode:
        description: 'Search mode'
        required: false
        default: 'Any Words'
        type: choice
        options:
          - 'Any Words'
          - 'All Words'
          - 'Phrase'

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Cache Puppeteer Chromium
        id: cache-chromium
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/puppeteer
          key: puppeteer-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            puppeteer-chromium-${{ runner.os }}-

      - name: Install Chromium for Puppeteer
        if: steps.cache-chromium.outputs.cache-hit != 'true'
        timeout-minutes: 4
        run: |
          npx --no-update-notifier puppeteer browsers install chrome \
            --path /home/runner/.cache/puppeteer &
          INSTALL_PID=$!
          for i in $(seq 1 180); do
            if ls /home/runner/.cache/puppeteer/chrome/linux-*/chrome-linux64/chrome 2>/dev/null; then
              kill -9 $INSTALL_PID 2>/dev/null || true
              wait 2>/dev/null || true
              exit 0
            fi
            sleep 2
          done
          echo "::error::Chromium install did not finish"
          kill -9 $INSTALL_PID 2>/dev/null || true
          exit 1

      - name: Run judgment search
        env:
          SEARCH_QUERY: ${{ inputs.query }}
          SEARCH_MODE: ${{ inputs.mode }}
        run: node src/judgment-search.js

      - name: Commit search results
        run: |
          git config --local user.email "scraper@lextrack"
          git config --local user.name "LexTrack Search"
          git add data/searches/
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "search: \"${{ inputs.query }}\" via eDHCR"
          git pull --rebase
          git push
