name: Scrape DHC Cases

on:
  # Schedule lives on sync-all.yml (the unified cron) — that workflow runs
  # both this scraper and the cause-list scraper together. Keeping this file
  # available as a manual trigger for one-off case scrapes via the GitHub UI
  # or the SCRAPE_CASE input.
  workflow_dispatch:
    inputs:
      case_no:
        description: 'Single case number to scrape (leave blank for full sync)'
        required: false
        default: ''

# Share sync-all's concurrency group so manual + scheduled runs serialize
# instead of racing each other on git push.
concurrency:
  group: sync-all
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: npm ci --prefer-offline --no-audit --no-fund

      # Cache the Chromium binary so future runs don't re-download (~10 min)
      - name: Cache Puppeteer Chromium
        id: cache-chromium
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/puppeteer
          key: puppeteer-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            puppeteer-chromium-${{ runner.os }}-

      - name: Install Chromium for Puppeteer
        if: steps.cache-chromium.outputs.cache-hit != 'true'
        timeout-minutes: 4
        # The install itself takes ~6s; the npx wrapper sometimes hangs
        # after success. We force-exit once the binary is present.
        run: |
          npx --no-update-notifier puppeteer browsers install chrome \
            --path /home/runner/.cache/puppeteer &
          INSTALL_PID=$!
          # Poll for the binary; once it exists, kill the wrapper and continue.
          for i in $(seq 1 180); do
            if ls /home/runner/.cache/puppeteer/chrome/linux-*/chrome-linux64/chrome 2>/dev/null; then
              echo "Chromium ready — terminating wrapper."
              kill -9 $INSTALL_PID 2>/dev/null || true
              wait 2>/dev/null || true
              exit 0
            fi
            sleep 2
          done
          echo "::error::Chromium install did not finish in 6 minutes"
          kill -9 $INSTALL_PID 2>/dev/null || true
          exit 1

      - name: Run scraper
        env:
          TWO_CAPTCHA_API_KEY: ${{ secrets.TWO_CAPTCHA_API_KEY }}
          SCRAPE_CASE: ${{ inputs.case_no }}
        run: node src/scraper.js

      - name: Commit updated data
        # Same "ours wins, retry on contention" pattern as sync-all.yml.
        run: |
          set -e
          git config --local user.email "scraper@lextrack"
          git config --local user.name "LexTrack Scraper"
          mkdir -p /tmp/snap
          [ -f data/scraped.json ] && cp data/scraped.json /tmp/snap/scraped.json || true
          for attempt in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main
            [ -f /tmp/snap/scraped.json ] && cp /tmp/snap/scraped.json data/scraped.json || true
            git add data/scraped.json 2>/dev/null || true
            if git diff --staged --quiet; then echo "No net change."; exit 0; fi
            git commit -m "chore: update scraped case data $(date -u '+%Y-%m-%d %H:%M UTC')"
            if git push origin main; then exit 0; fi
            sleep 3
          done
          echo "::error::Push failed after 3 attempts."
          exit 1
