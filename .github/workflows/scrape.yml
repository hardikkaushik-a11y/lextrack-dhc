name: Scrape DHC Cases

on:
  schedule:
    # Every 8 hours. Each run is ~3 min billable. 3 runs/day × 30 = 270
    # min/month — within free tier alongside the cause-list scraper.
    # Case-status data changes only when orders upload (typically a few
    # hours after a hearing); 8-hour polling catches it before the next
    # business day.
    # 03:30, 11:30, 19:30 IST = 22:00 UTC, 06:00 UTC, 14:00 UTC
    - cron: '0 22,6,14 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI / API
    inputs:
      case_no:
        description: 'Single case number to scrape (leave blank for full sync)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: npm ci --prefer-offline --no-audit --no-fund

      # Cache the Chromium binary so future runs don't re-download (~10 min)
      - name: Cache Puppeteer Chromium
        id: cache-chromium
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/puppeteer
          key: puppeteer-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            puppeteer-chromium-${{ runner.os }}-

      - name: Install Chromium for Puppeteer
        if: steps.cache-chromium.outputs.cache-hit != 'true'
        timeout-minutes: 4
        # The install itself takes ~6s; the npx wrapper sometimes hangs
        # after success. We force-exit once the binary is present.
        run: |
          npx --no-update-notifier puppeteer browsers install chrome \
            --path /home/runner/.cache/puppeteer &
          INSTALL_PID=$!
          # Poll for the binary; once it exists, kill the wrapper and continue.
          for i in $(seq 1 180); do
            if ls /home/runner/.cache/puppeteer/chrome/linux-*/chrome-linux64/chrome 2>/dev/null; then
              echo "Chromium ready — terminating wrapper."
              kill -9 $INSTALL_PID 2>/dev/null || true
              wait 2>/dev/null || true
              exit 0
            fi
            sleep 2
          done
          echo "::error::Chromium install did not finish in 6 minutes"
          kill -9 $INSTALL_PID 2>/dev/null || true
          exit 1

      - name: Run scraper
        env:
          TWO_CAPTCHA_API_KEY: ${{ secrets.TWO_CAPTCHA_API_KEY }}
          SCRAPE_CASE: ${{ inputs.case_no }}
        run: node src/scraper.js

      - name: Commit updated data
        run: |
          git config --local user.email "scraper@lextrack"
          git config --local user.name "LexTrack Scraper"
          git add data/scraped.json
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: update scraped case data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase
          git push
