name: Sync DHC (all scrapers)

# Unified workflow — the ONE scheduled job for the repo. Runs:
#   1. Cause-list scraper   (scripts/scrape_causelist.py — HTTP + pdftotext)
#   2. Case-status scraper  (src/scraper.js — Puppeteer)
# Triggered by:
#   - Schedule (every 10 min cause list, every 30 min full — see crons below)
#   - The "Sync DHC" button in the app (workflow_dispatch via REST API)
#   - Manual run from the GitHub Actions UI
#
# Why one workflow instead of two scheduled crons: GitHub's scheduler is more
# reliable when only one cron is registered per repo (frequent edits to
# multiple cron files put their schedulers into a "settling" state where
# runs silently drop). Consolidating means one place to debug.
#
# Public repo → unlimited free Actions minutes, so 15-min cadence is fine.

on:
  schedule:
    # Cause list ONLY — fires at :10, :20, :40, :50 of every hour. Fast
    # (~25s), cheap, and the cause-list PDFs change throughout the day as
    # DHC publishes morning + supplementary lists. Combined with the full
    # sync below, cause list refreshes every 10 minutes total.
    - cron: '10,20,40,50 * * * *'
    # FULL sync (cause list + case status) — every 30 min, at :00 and :30.
    # Case-status scrape is slow (~2 min) and hits DHC for every tracked
    # matter, so 30-min cadence catches newly uploaded order PDFs fast
    # while staying respectful to DHC's site.
    - cron: '0,30 * * * *'
  workflow_dispatch:
    inputs:
      include_case_scrape:
        description: 'Run case-status scraper (slow, ~2 min). Uncheck for cause-list-only refresh.'
        required: false
        type: boolean
        default: true

# Only one sync runs at a time. If a manual dispatch fires while a cron
# is mid-flight, the cron is cancelled — the new run picks up DHC's freshest
# data anyway. Without this, two runs racing each other on git push caused
# rebase conflicts on data/causelist.json.
concurrency:
  group: sync-all
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Cause list (always — cheap and most time-sensitive) ──────────
      - name: Install poppler-utils
        run: sudo apt-get update -qq && sudo apt-get install -y poppler-utils

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install --quiet 'requests>=2.31,<3'

      - name: Run cause-list scraper
        run: python3 scripts/scrape_causelist.py

      # ── Node.js setup (always — needed for both case-status scraper and
      # the push-notification dispatcher). PUPPETEER_SKIP_DOWNLOAD prevents
      # Chromium from being pulled by `npm ci`; the heavy Chromium install
      # is still gated below to only run on the full-sync path. web-push
      # lives in package.json so this single npm ci covers it.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Cache Puppeteer Chromium
        if: ${{ github.event.schedule != '10,20,40,50 * * * *' && inputs.include_case_scrape != false }}
        id: cache-chromium
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/puppeteer
          key: puppeteer-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            puppeteer-chromium-${{ runner.os }}-

      - name: Install Chromium for Puppeteer
        if: ${{ github.event.schedule != '10,20,40,50 * * * *' && inputs.include_case_scrape != false && steps.cache-chromium.outputs.cache-hit != 'true' }}
        timeout-minutes: 4
        run: |
          npx --no-update-notifier puppeteer browsers install chrome \
            --path /home/runner/.cache/puppeteer &
          INSTALL_PID=$!
          for i in $(seq 1 180); do
            if ls /home/runner/.cache/puppeteer/chrome/linux-*/chrome-linux64/chrome 2>/dev/null; then
              kill -9 $INSTALL_PID 2>/dev/null || true
              wait 2>/dev/null || true
              exit 0
            fi
            sleep 2
          done
          kill -9 $INSTALL_PID 2>/dev/null || true
          exit 1

      - name: Run case-status scraper
        if: ${{ github.event.schedule != '10,20,40,50 * * * *' && inputs.include_case_scrape != false }}
        run: node src/scraper.js

      # ── Push notifications (always — runs after data is fresh on disk
      # but BEFORE commit, so HEAD still represents the previous state and
      # the diff between disk and HEAD = "what just changed in this run").
      # Failure here is non-fatal: send-push.js exits 0 on any error so a
      # missing VAPID secret or expired subscription never blocks the sync.
      - name: Send push notifications (diff)
        # Each PUSH_SUBSCRIPTIONS* secret is one device. send-push.js scans
        # process.env for everything matching PUSH_SUBSCRIPTIONS(_\d+)? and
        # merges them, so adding a new device = create a new numbered
        # secret in repo settings; no code change here.
        env:
          VAPID_PUBLIC_KEY:      ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY:     ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT:         ${{ secrets.VAPID_SUBJECT }}
          PUSH_SUBSCRIPTIONS:    ${{ secrets.PUSH_SUBSCRIPTIONS }}
          PUSH_SUBSCRIPTIONS_2:  ${{ secrets.PUSH_SUBSCRIPTIONS_2 }}
          PUSH_SUBSCRIPTIONS_3:  ${{ secrets.PUSH_SUBSCRIPTIONS_3 }}
          PUSH_SUBSCRIPTIONS_4:  ${{ secrets.PUSH_SUBSCRIPTIONS_4 }}
          PUSH_SUBSCRIPTIONS_5:  ${{ secrets.PUSH_SUBSCRIPTIONS_5 }}
        run: node scripts/send-push.js

      # ── Commit everything in one go ──────────────────────────────────
      # Resilient against parallel pushes. Strategy: snapshot our scraper
      # outputs to /tmp BEFORE touching git, then on each attempt reset to
      # the latest origin/main, restore our snapshots on top, commit, push.
      # If origin moves between fetch and push, retry (next iteration sees
      # the new tip). "Ours wins" is always correct here — our snapshot is
      # the freshest scrape; older parallel runs are stale by definition.
      - name: Commit updated data
        run: |
          set -e
          git config --local user.email "scraper@lextrack"
          git config --local user.name "LexTrack Sync"

          # Snapshot whatever the scrapers wrote so we can re-apply after
          # any reset. Files may not exist (e.g. case-status skipped on
          # quarter-hour cron), so guard each cp.
          mkdir -p /tmp/snap
          [ -f data/scraped.json ]   && cp data/scraped.json   /tmp/snap/scraped.json   || true
          [ -f data/causelist.json ] && cp data/causelist.json /tmp/snap/causelist.json || true

          for attempt in 1 2 3; do
            echo "── attempt $attempt ──"
            git fetch origin main
            git reset --hard origin/main

            # Re-apply our snapshot on top of the freshest origin/main.
            [ -f /tmp/snap/scraped.json ]   && cp /tmp/snap/scraped.json   data/scraped.json   || true
            [ -f /tmp/snap/causelist.json ] && cp /tmp/snap/causelist.json data/causelist.json || true

            git add data/scraped.json data/causelist.json 2>/dev/null || true
            if git diff --staged --quiet; then
              echo "No net change vs origin — nothing to push."
              exit 0
            fi

            git commit -m "chore: sync (causelist + cases) $(date -u '+%Y-%m-%d %H:%M UTC')"
            if git push origin main; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (origin moved) — retrying…"
            sleep 3
          done
          echo "::error::Push failed after 3 attempts."
          exit 1
