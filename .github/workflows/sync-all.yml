name: Sync DHC (all scrapers)

# Unified workflow — the ONE scheduled job for the repo. Runs:
#   1. Cause-list scraper   (scripts/scrape_causelist.py — HTTP + pdftotext)
#   2. Case-status scraper  (src/scraper.js — Puppeteer)
# Triggered by:
#   - Schedule (every 15 min — see cron below)
#   - The "Sync DHC" button in the app (workflow_dispatch via REST API)
#   - Manual run from the GitHub Actions UI
#
# Why one workflow instead of two scheduled crons: GitHub's scheduler is more
# reliable when only one cron is registered per repo (frequent edits to
# multiple cron files put their schedulers into a "settling" state where
# runs silently drop). Consolidating means one place to debug.
#
# Public repo → unlimited free Actions minutes, so 15-min cadence is fine.

on:
  schedule:
    # Cause list ONLY — fires at :15, :30, :45 of every hour. Fast (~25s),
    # cheap, and the cause-list PDFs change throughout the day as DHC
    # publishes morning + supplementary lists.
    - cron: '15,30,45 * * * *'
    # FULL sync (cause list + case status) — top of every hour. Case-status
    # scrape is slow (~2 min) and hits DHC for every tracked matter, so
    # hourly is the right cadence to stay respectful while still catching
    # newly uploaded order PDFs within ~60 min.
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      include_case_scrape:
        description: 'Run case-status scraper (slow, ~2 min). Uncheck for cause-list-only refresh.'
        required: false
        type: boolean
        default: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Cause list (always — cheap and most time-sensitive) ──────────
      - name: Install poppler-utils
        run: sudo apt-get update -qq && sudo apt-get install -y poppler-utils

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install --quiet 'requests>=2.31,<3'

      - name: Run cause-list scraper
        run: python3 scripts/scrape_causelist.py

      # ── Case-status scraper (Puppeteer — slow, optional) ────────────
      - name: Setup Node.js
        if: ${{ github.event.schedule != '15,30,45 * * * *' && inputs.include_case_scrape != false }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        if: ${{ github.event.schedule != '15,30,45 * * * *' && inputs.include_case_scrape != false }}
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Cache Puppeteer Chromium
        if: ${{ github.event.schedule != '15,30,45 * * * *' && inputs.include_case_scrape != false }}
        id: cache-chromium
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/puppeteer
          key: puppeteer-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            puppeteer-chromium-${{ runner.os }}-

      - name: Install Chromium for Puppeteer
        if: ${{ github.event.schedule != '15,30,45 * * * *' && inputs.include_case_scrape != false && steps.cache-chromium.outputs.cache-hit != 'true' }}
        timeout-minutes: 4
        run: |
          npx --no-update-notifier puppeteer browsers install chrome \
            --path /home/runner/.cache/puppeteer &
          INSTALL_PID=$!
          for i in $(seq 1 180); do
            if ls /home/runner/.cache/puppeteer/chrome/linux-*/chrome-linux64/chrome 2>/dev/null; then
              kill -9 $INSTALL_PID 2>/dev/null || true
              wait 2>/dev/null || true
              exit 0
            fi
            sleep 2
          done
          kill -9 $INSTALL_PID 2>/dev/null || true
          exit 1

      - name: Run case-status scraper
        if: ${{ github.event.schedule != '15,30,45 * * * *' && inputs.include_case_scrape != false }}
        run: node src/scraper.js

      # ── Commit everything in one go ──────────────────────────────────
      - name: Commit updated data
        run: |
          git config --local user.email "scraper@lextrack"
          git config --local user.name "LexTrack Sync"
          git add data/scraped.json data/causelist.json 2>/dev/null || true
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "chore: sync (causelist + cases) $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase
          git push
