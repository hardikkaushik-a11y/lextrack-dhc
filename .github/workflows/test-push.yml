name: Test push notifications

# Manual-only workflow that fires ONE synthetic push to every subscriber.
# Use this to verify the full chain works without waiting for DHC to
# publish a real change:
#   VAPID secrets configured ✓ → script runs ✓ → push service delivers ✓ →
#   SW handler fires ✓ → lock-screen notification visible ✓
#
# Trigger from:
#   - GitHub Actions UI → "Test push notifications" → Run workflow
#   - Or curl the dispatch endpoint directly with a PAT
#
# Never scheduled. Spamming subscribers with test pushes would train them
# to ignore the channel — defeats the whole point.

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    # `npm install web-push` cold consistently hits ~4 min on GitHub's
    # ubuntu-latest because it pulls deprecated transitive deps that
    # don't cache well. 10 gives 2x headroom; the actual push step is
    # ~1 second. Future optimisation: pin web-push in a checked-in
    # package-lock.json + use npm ci with actions/setup-node cache.
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Caches node_modules keyed on package-lock.json hash. First
          # run is still ~4 min cold; subsequent runs hit the cache and
          # finish in ~10s. Was the bottleneck killing test-push before.
          cache: 'npm'

      - name: Install dependencies
        # web-push is pinned in package.json (with the puppeteer family
        # for src/scraper.js). PUPPETEER_SKIP_DOWNLOAD makes puppeteer's
        # postinstall skip the ~500 MB Chromium download — we don't need
        # the browser for sending pushes, just the web-push library.
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Send test push to every subscriber
        env:
          VAPID_PUBLIC_KEY:      ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY:     ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT:         ${{ secrets.VAPID_SUBJECT }}
          PUSH_SUBSCRIPTIONS:    ${{ secrets.PUSH_SUBSCRIPTIONS }}
          PUSH_SUBSCRIPTIONS_2:  ${{ secrets.PUSH_SUBSCRIPTIONS_2 }}
          PUSH_SUBSCRIPTIONS_3:  ${{ secrets.PUSH_SUBSCRIPTIONS_3 }}
          PUSH_SUBSCRIPTIONS_4:  ${{ secrets.PUSH_SUBSCRIPTIONS_4 }}
          PUSH_SUBSCRIPTIONS_5:  ${{ secrets.PUSH_SUBSCRIPTIONS_5 }}
        run: node scripts/send-push.js --test
