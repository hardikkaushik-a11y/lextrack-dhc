name: Scrape DHC Cause List

# Daily scrape of the Delhi High Court cause list PDFs for cases tracked
# in config/cases.json. Two firings per day:
#
#   • 21:30 IST  (16:00 UTC) — captures the "advance" list for tomorrow,
#                              which DHC publishes in the evening
#   • 07:00 IST  (01:30 UTC) — re-runs to pick up overnight supplementary
#                              additions and the morning's finalised list
#
# Output: data/causelist.json — committed back to the repo so both the
# personal and brand apps can fetch it from raw.githubusercontent.com.

on:
  schedule:
    # Every 15 minutes. Public repo → unlimited free GitHub Actions minutes,
    # so we'd love to run more often, but GitHub's cron scheduler silently
    # drops a large fraction of sub-15-min runs. */15 is the sweet spot
    # documented as ~95%+ honored. For instant freshness, the "Sync DHC"
    # button still triggers a manual workflow_dispatch.
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Generous safety net — typical run is <90s. If it climbs past 5 min
    # something is wrong (PDF parser hung, DHC site is down).
    timeout-minutes: 6
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install poppler-utils (for fast PDF text extraction)
        # Using `pdftotext` instead of pdfplumber: ~20× faster on the giant
        # cause-list PDFs (some are 1000+ pages). One-time apt install adds
        # ~3s to the run; pays for itself many times over.
        run: sudo apt-get update -qq && sudo apt-get install -y poppler-utils

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        # Only `requests` now — pdftotext is the system binary above.
        run: pip install --quiet 'requests>=2.31,<3'

      - name: Run cause-list scraper
        run: python3 scripts/scrape_causelist.py

      - name: Commit updated cause list
        run: |
          git config --local user.email "scraper@lextrack"
          git config --local user.name "LexTrack Causelist"
          git add data/causelist.json
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "chore: update cause list $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase
          git push
