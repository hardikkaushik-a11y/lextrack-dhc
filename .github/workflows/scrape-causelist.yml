name: Scrape DHC Cause List

# Daily scrape of the Delhi High Court cause list PDFs for cases tracked
# in config/cases.json. Two firings per day:
#
#   • 21:30 IST  (16:00 UTC) — captures the "advance" list for tomorrow,
#                              which DHC publishes in the evening
#   • 07:00 IST  (01:30 UTC) — re-runs to pick up overnight supplementary
#                              additions and the morning's finalised list
#
# Output: data/causelist.json — committed back to the repo so both the
# personal and brand apps can fetch it from raw.githubusercontent.com.

on:
  # Schedule lives on sync-all.yml (the unified cron). This workflow stays
  # available as a manual trigger — useful when only the cause list needs a
  # refresh without paying the ~2 min cost of the case-status scraper.
  workflow_dispatch:

# Share the sync-all concurrency group so a manual cause-list run can't
# clash with an in-flight scheduled sync (which writes the same file).
concurrency:
  group: sync-all
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Generous safety net — typical run is <90s. If it climbs past 5 min
    # something is wrong (PDF parser hung, DHC site is down).
    timeout-minutes: 6
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install poppler-utils (for fast PDF text extraction)
        # Using `pdftotext` instead of pdfplumber: ~20× faster on the giant
        # cause-list PDFs (some are 1000+ pages). One-time apt install adds
        # ~3s to the run; pays for itself many times over.
        run: sudo apt-get update -qq && sudo apt-get install -y poppler-utils

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        # Only `requests` now — pdftotext is the system binary above.
        run: pip install --quiet 'requests>=2.31,<3'

      - name: Run cause-list scraper
        run: python3 scripts/scrape_causelist.py

      # ── Push notifications BEFORE commit ────────────────────────────────
      # send-push.js diffs the freshly-scraped data/causelist.json on disk
      # against HEAD (= the previous committed cause list). If the cron-job
      # only fires this workflow (not sync-all), pushes still need to go out
      # for new cause-list entries. Same pattern as sync-all.yml — runs
      # before commit so HEAD represents the prior state.
      - name: Setup Node.js (for push dispatcher)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Send push notifications (cause-list diff)
        # Same env contract as sync-all.yml. Adding new device = new numbered
        # PUSH_SUBSCRIPTIONS_N secret, no code change needed here.
        env:
          VAPID_PUBLIC_KEY:      ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY:     ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT:         ${{ secrets.VAPID_SUBJECT }}
          PUSH_SUBSCRIPTIONS:    ${{ secrets.PUSH_SUBSCRIPTIONS }}
          PUSH_SUBSCRIPTIONS_2:  ${{ secrets.PUSH_SUBSCRIPTIONS_2 }}
          PUSH_SUBSCRIPTIONS_3:  ${{ secrets.PUSH_SUBSCRIPTIONS_3 }}
          PUSH_SUBSCRIPTIONS_4:  ${{ secrets.PUSH_SUBSCRIPTIONS_4 }}
          PUSH_SUBSCRIPTIONS_5:  ${{ secrets.PUSH_SUBSCRIPTIONS_5 }}
        run: node scripts/send-push.js

      - name: Commit updated cause list
        # Same "ours wins, retry on contention" pattern as sync-all.yml.
        run: |
          set -e
          git config --local user.email "scraper@lextrack"
          git config --local user.name "LexTrack Causelist"
          mkdir -p /tmp/snap
          [ -f data/causelist.json ]         && cp data/causelist.json         /tmp/snap/causelist.json         || true
          [ -f data/last-pushed-state.json ] && cp data/last-pushed-state.json /tmp/snap/last-pushed-state.json || true
          for attempt in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main
            [ -f /tmp/snap/causelist.json ]         && cp /tmp/snap/causelist.json         data/causelist.json         || true
            [ -f /tmp/snap/last-pushed-state.json ] && cp /tmp/snap/last-pushed-state.json data/last-pushed-state.json || true
            git add data/causelist.json data/last-pushed-state.json 2>/dev/null || true
            if git diff --staged --quiet; then echo "No net change."; exit 0; fi
            git commit -m "chore: update cause list $(date -u '+%Y-%m-%d %H:%M UTC')"
            if git push origin main; then exit 0; fi
            sleep 3
          done
          echo "::error::Push failed after 3 attempts."
          exit 1
